<!DOCTYPE html>
<html lang="en">
<head>
    <title>farmer signup</title>
</head>
<body>
    <h1>hy welcome to farmer signup page</h1>

    <form method="post">
        {% csrf_token %}
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li {% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        <label for="f_name">First name</label>
        <input type="text" id="f_name" name='first_name' required> <br><br>

        <label for="l_name">Last name</label>
        <input type="text" id="l_name" name='last_name' required> <br><br>

        <label for="contact">Contact no</label>
        <input type="number" id="contact" name='contact_no' required> <br><br>

        <label for="name">Email</label>
        <input type="email" id="email" name='email' required> <br><br>

        <label for="password">Create password</label>
        <input type="password" id='password' name='password' required> <br><br>

        <label for="re-password">Re-enter password</label>
        <input type="password" id='re-password' name='re-password' required> <br><br>
        

        <input type="submit" value='submit'>

    </form>
</body>
</html>
