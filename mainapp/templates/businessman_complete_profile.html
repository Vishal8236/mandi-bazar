<!DOCTYPE html>
<html lang="en">
<head>
    <title>Businessman complete profile</title>
</head>
<body>
    <h1>hy welcome to Businessman signup page</h1>

    <form method="post">
        {% csrf_token %}
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li {% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        <label for="Adhar">Adhar card</label>
        <input type="number" id="Adhar" name='Adhar_card' required> <br><br>

        <label for="Pan">Pan card</label>
        <input type="text" id="Pan" name='Pan_card' required> <br><br>

        <label for="gst">Gst Number</label>
        <input type="number" id="gst" name='gst_number' required> <br><br>

        <label for="Address">Address</label>
        <input type="text" id="Address" name='Address' required> <br><br>

        <label for="Bank_account_no">Bank account no</label>
        <input type="number" id="Bank_account_no" name='Bank_account_no' required> <br><br>

        <label for="Account_holder_name">Account holder name</label>
        <input type="text" id='Account_holder_name' name='Account_holder_name' required> <br><br>

        <label for="Ifsc_code">Ifsc code</label>
        <input type="text" id='Ifsc_code' name='Ifsc_code' required> <br><br>
        

        <input type="submit" value='submit'>

    </form>
</body>
</html>
